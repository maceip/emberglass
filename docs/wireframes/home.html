<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emberglass — Home / Inventory (Skillbook)</title>
<link rel="stylesheet" href="wireframes.css">
<style>
  .home__grid{ display:grid; grid-template-columns:1fr 420px; gap:var(--s4); align-items:start; }
  .skillbook{ position:sticky; top:64px; }
  .browser{ background:#eef0f2; border:1px solid #c8ccd1; border-radius:10px; overflow:hidden; box-shadow:var(--shadow-2); }
  .browser__chrome{ display:flex; gap:8px; align-items:center; padding:8px 10px; background:linear-gradient(#dfe3e7,#cdd2d8); border-bottom:1px solid #b7bcc3; }
  .browser__tab{ font-size:12px; padding:5px 12px; border-radius:8px 8px 0 0; background:#f6f7f8; color:#445; border:1px solid #c8ccd1; border-bottom:none; }
  .browser__tab.on{ background:#fff; font-weight:700; color:#1b1b18; }
  .browser__url{ flex:1; background:#fff; border:1px solid #c8ccd1; border-radius:14px; padding:5px 12px; font-size:12px; color:#557; }
  .browser__page{ padding:18px; background:#fff; color:#3a4350; min-height:420px; }
  .gcal{ display:grid; grid-template-columns:48px repeat(3,1fr); gap:1px; background:#e6e8eb; border:1px solid #e6e8eb; border-radius:8px; overflow:hidden; }
  .gcal div{ background:#fff; padding:7px 5px; font-size:11px; color:#788; min-height:28px; }
  .gcal .h{ background:#f6f8fa; font-weight:700; color:#445; text-align:center; }
  .gcal .ev{ background:#e3f0ff; color:#15528a; border-radius:5px; margin:1px; font-weight:600; }
  .roots{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .invgroup{ display:flex; flex-direction:column; gap:6px; }
  .nextunlock{ display:flex; gap:10px; align-items:center; }
  .selcard{ background:#fff6ee; border:1px solid var(--ember); border-radius:var(--radius); padding:var(--s3); display:flex; flex-direction:column; gap:8px; }
  .selcard .acts{ display:flex; gap:6px; flex-wrap:wrap; }
  @media (max-width:1000px){ .home__grid{ grid-template-columns:1fr; } .skillbook{ position:static; } .browser{ order:2; } }
  @media (max-width:560px){
    .stage{ padding:8px; } .skillbook .win__body{ padding:10px; gap:14px; }
    .browser{ display:none; }
    .heroslot{ flex-wrap:wrap; border-width:12px; }
    .roots{ grid-template-columns:repeat(3,1fr); gap:6px; }
    .roots .tile{ flex-direction:column; align-items:center; text-align:center; gap:5px; padding:8px 4px; }
    .roots .tile .lv{ display:none; } .roots .tile__body{ align-items:center; }
    .roots .tile__body b{ font-size:11px; } .roots .proof{ display:none; }
    .selcard .acts .btn{ flex:1; }
  }
</style>
</head>
<body>
<div id="nav"></div>
<div class="stage">
  <p class="ffnote">Skillbook — “I have Calendar equipped, I know what it can do, I can try it right now.” Desktop shows the app beside the panel; it collapses to a pocket skillbook on mobile.</p>
  <div class="home__grid" id="app"></div>
</div>

<script type="module">
import { nav } from './ui.js';
import * as UI from './ui.js';
import * as S from './state.js';

document.getElementById('nav').innerHTML = nav('home');

const cal = S.skillById('calendar');
const roots = ['gmail','calendar','notes'].map(S.skillById);
const trained = S.SKILLS.filter(s=>s.status==='equipped'||s.lastTrainedAt && s.status!=='locked');
const available = S.SKILLS.filter(s=>s.status==='available' && !s.lastTrainedAt);
const locked = S.lockedSkills();
const sel = cal; // selected = the equipped starter spell

const browser = `
  <section class="browser keep">
    <div class="browser__chrome">
      <span class="browser__tab on">Google Calendar</span>
      <span class="browser__tab">Gmail</span>
      <span class="browser__url">calendar.google.com/r/week</span>
    </div>
    <div class="browser__page">
      <strong style="font-size:15px">Week of Jun 29</strong>
      <div class="gcal" style="margin-top:10px">
        <div class="h"></div><div class="h">Mon</div><div class="h">Tue</div><div class="h">Wed</div>
        <div>9a</div><div class="ev">Standup</div><div></div><div></div>
        <div>11a</div><div></div><div class="ev">1:1 Dana</div><div></div>
        <div>1p</div><div></div><div></div><div class="ev">Design rev</div>
        <div>2p</div><div></div><div></div><div></div>
      </div>
      <p class="muted" style="margin-top:14px">The real app stays in view. Emberglass reads the surface and proposes verified plans — it never takes the page over.</p>
    </div>
  </section>`;

const skillbook = `
  <aside class="skillbook win">
    <div class="win__bar"><span class="win__dot"></span> Home / Inventory <span style="opacity:.7">*H1</span><span class="grow"></span></div>
    <div class="win__body col" style="gap:var(--s4)">

      <div class="panel row keep" style="gap:10px">
        ${UI.skillIcon(cal,{size:'sm'})}
        <div class="grow"><b>surface: Calendar / Google</b><div class="muted">calendar.google.com · captured</div></div>
        <span class="dryrun">⛬ dry-run</span>
      </div>

      <div class="heroslot keep">
        ${UI.skillIcon(cal,{size:'lg'})}
        <div class="grow"><div class="row" style="gap:8px"><b style="font-size:17px">${cal.displayName} Lv${cal.level}</b> ${UI.stateBadge(cal)}</div>
          <div class="muted">your equipped starting spell</div>
          ${UI.writeIcons(cal.allowedWrites,{labels:false})}
        </div>
      </div>

      <div>
        <div class="sec">Core account roots</div>
        <div class="roots">${roots.map(s=>UI.skillTile(s,{selected:s.id==='calendar'})).join('')}</div>
      </div>

      <div>
        <div class="sec">Skill inventory</div>
        <div class="invgroup">
          <span class="muted">trained</span>
          ${trained.map(s=>UI.skillTile(s)).join('')}
          <span class="muted">available</span>
          ${available.map(s=>UI.skillTile(s)).join('')}
          <span class="muted">locked — promises, not walls</span>
          ${locked.map(s=>UI.skillTile(s)).join('')}
        </div>
      </div>

      <div class="callout">Next unlock — Gmail Inbox → Calendar handoff · requires: train Inbox starter</div>

      <div class="selcard">
        <div class="row" style="gap:10px">${UI.skillIcon(sel,{size:'md'})}
          <div class="grow"><b>Selected: ${sel.displayName} Lv${sel.level}</b> ${UI.stateBadge(sel)}</div></div>
        <div><div class="sec">can write *I1</div>${UI.writeIcons(sel.allowedWrites)}</div>
        <div class="muted">eval: ${sel.baseScore}% → ${sel.evalScore}% after starter drills</div>
        <div class="acts">
          <a class="btn" href="skill.html">Train</a>
          <button class="btn btn--hero" type="button">Equip</button>
          <a class="btn" href="skill.html">Open Skill</a>
        </div>
      </div>

      ${UI.castBox(S.CAST.command,{verb:'Cast Request',btn:'Cast'})}
      ${UI.planSeal(S.CAST)}

      <a class="btn btn--block" href="job-board.html">Open Quest Board →</a>
    </div>
  </aside>`;

document.getElementById('app').innerHTML = browser + skillbook;
</script>
</body>
</html>
