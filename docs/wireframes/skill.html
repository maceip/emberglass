<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emberglass — Skill / Train Surface (Trial Page)</title>
<link rel="stylesheet" href="wireframes.css">
<style>
  .skill__head{ display:flex; align-items:center; gap:var(--s4); flex-wrap:wrap; }
  .three{ display:grid; grid-template-columns:1fr 1.1fr 1fr; gap:var(--s3); }
  .trials{ display:flex; flex-direction:column; gap:8px; }
  .reward-acts{ display:flex; gap:8px; flex-wrap:wrap; }
  .forgewrap{ display:flex; flex-direction:column; gap:10px; }
  @media (max-width:900px){ .three{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="nav"></div>
<div class="stage">
  <p class="ffnote">Trial Page — “I know what Calendar must learn, I see the exact trials, I pressed Train and watched weak trials improve, I earned the right to equip.”</p>
  <div id="app" class="col" style="gap:var(--s4)"></div>
</div>

<script type="module">
import { nav } from './ui.js';
import * as UI from './ui.js';
import * as S from './state.js';

document.getElementById('nav').innerHTML = nav('skill');

const sk = S.skillById('calendar');
const trials = S.TRIALS.calendar;
const passed = trials.filter(t=>t.status==='pass').length;

const head = `
  <div class="win">
    <div class="win__bar"><span class="win__dot"></span> Skill / Train Surface — ${sk.displayName} <span style="opacity:.7">*S1</span></div>
    <div class="win__body skill__head">
      ${UI.skillIcon(sk,{size:'lg'})}
      <div class="grow">
        <div class="row" style="gap:10px"><b style="font-size:17px">Target: ${sk.displayName} / ${sk.provider}</b> ${UI.stateBadge(sk)}</div>
        <div class="callout" style="margin-top:6px">Reward — equip ${sk.displayName} and unlock the Gmail → Calendar handoff</div>
      </div>
    </div>
  </div>`;

const three = `
  <div class="three">
    <div class="panel"><div class="sec">Training target</div>
      <div class="row" style="gap:10px">${UI.skillIcon(sk,{size:'md'})}<div><b>${sk.displayName}</b><div class="muted">provider: ${sk.provider}</div><div class="muted">surface: events</div></div></div>
    </div>
    <div class="panel"><div class="sec">Allowed writes *I1</div>${UI.writeIcons(sk.allowedWrites)}</div>
    <div class="panel"><div class="sec">Before / After</div>
      <div class="delta">
        <div class="col"><span class="num base">${sk.baseScore}%</span><span class="muted">base contract</span></div>
        <span class="arrow">→</span>
        <div class="col"><span class="num after">${sk.evalScore}%</span><span class="muted">trained · OOS ${sk.oosPassRate}%</span></div>
      </div>
      <div class="muted" style="margin-top:6px">delta +${sk.evalScore-sk.baseScore} pts</div>
    </div>
  </div>`;

const trialCards = `
  <div class="win"><div class="win__bar"><span class="win__dot"></span> Trials <span style="opacity:.7">*C1</span></div>
    <div class="win__body trials">
      ${trials.map(t=>`
        <div class="trial trial--${t.status}">
          <span class="trial__seal">${t.status==='pass'?'✓':'!'}</span>
          <div class="grow"><b>${t.name}</b> — <span class="muted">${t.prompt}</span>
            <div class="why">${t.status==='pass'?('learned '+t.learns):('next trial: '+t.reward)}</div></div>
          <span class="state state--${t.status==='pass'?'reliable':'learning'}">${t.status==='pass'?'pass':'weak'}</span>
        </div>`).join('')}
    </div>
  </div>`;

const forge = `
  <div class="win"><div class="win__bar"><span class="win__dot"></span> Forge <span style="opacity:.7">*P1</span></div>
    <div class="win__body forgewrap">
      <div class="row between"><b>Starter Trial Pack</b><span class="muted">18 examples · 4 trial types</span></div>
      ${UI.forgeMeter(passed, trials.length)}
      <div class="row" style="gap:8px"><button class="btn btn--hero" type="button">Train Starter Skill</button><button class="btn" type="button">Stop</button>
        <a class="btn btn--sm" href="#" onclick="return false">details</a></div>
    </div>
  </div>`;

const reward = `
  <div class="win"><div class="win__bar"><span class="win__dot"></span> Reward</div>
    <div class="win__body reward-acts">
      <a class="btn btn--hero" href="home.html">Equip Calendar</a>
      <button class="btn" type="button">Add After Gmail</button>
      <a class="btn" href="job-board.html">Claim Next Trial</a>
      <a class="btn" href="job-board.html">Open Job Board</a>
    </div>
  </div>`;

document.getElementById('app').innerHTML = head + three + trialCards + forge + reward;
</script>
</body>
</html>
