<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emberglass — Skill / Train Surface (Trial Page)</title>
<link rel="stylesheet" href="wireframes.css">
<style>
  .skill__head{ display:flex; align-items:center; gap:var(--s4); flex-wrap:wrap; }
  .three{ display:grid; grid-template-columns:1fr 1.1fr 1fr; gap:var(--s3); }
  .trials{ display:flex; flex-direction:column; gap:8px; }
  .reward-acts{ display:flex; gap:8px; flex-wrap:wrap; }
  .forgewrap{ display:flex; flex-direction:column; gap:10px; }
  /* responsive must live here (after wireframes.css) to win the cascade:
     foldable → two-pane (Before/After drops full-width), mobile → single column
     + the trials become the numbered stepper styled in wireframes.css */
  @media (min-width:721px) and (max-width:1080px){
    .three{ grid-template-columns:1fr 1fr; }
    .three .panel:last-child{ grid-column:1 / -1; }
  }
  @media (max-width:720px){ .three{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="nav"></div>
<div class="stage">
  <p class="ffnote">Trial Page — “I know what Calendar must learn, I see the exact trials, I press Train and watch the weak trial improve, I earn the right to equip.” Try the <b>Train Starter Skill</b> button.</p>
  <div id="app" class="col" style="gap:var(--s4)"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { nav } from './ui.js';
import * as UI from './ui.js';
import * as S from './state.js';

document.getElementById('nav').innerHTML = nav('skill');

const sk = S.skillById('calendar');
const qs = new URLSearchParams(location.search);
// mutable trial + score model for this session (the wireframe's "training run")
let trials = S.TRIALS.calendar.map(t=>({ ...t }));
let score = Number(qs.get('score')) || sk.evalScore;
let oos = Number(qs.get('oos')) || sk.oosPassRate;
let trained = qs.get('trained') === '1';
let training = false, justId = null;
if (trained) trials = trials.map(t => ({ ...t, status: t.id === 't1' ? 'pass' : t.status }));

function toast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}
function badge(){
  const lbl = score>=97?'Mastered':score>=90?'Reliable':'Learning';
  const hue = score>=90?'reliable':'learning';
  return `<span class="state state--${hue}"><span class="led"></span>${lbl}</span><span class="proof">${score}%</span>`;
}

function render(){
  const passed = trials.filter(t=>t.status==='pass').length;
  const head = `
    <div class="win">
      <div class="win__bar"><span class="win__dot"></span> Skill / Train Surface — ${sk.displayName} <span style="opacity:.7">*S1</span></div>
      <div class="win__body skill__head">
        ${UI.skillIcon(sk,{size:'lg'})}
        <div class="grow">
          <div class="row" style="gap:10px"><b style="font-size:17px">Target: ${sk.displayName} / ${sk.provider}</b> ${badge()}</div>
          <div class="callout" style="margin-top:6px">Reward — equip ${sk.displayName} and unlock the Gmail → Calendar handoff</div>
        </div>
      </div>
    </div>`;

  const three = `
    <div class="three">
      <div class="panel"><div class="sec">Training target</div>
        <div class="row" style="gap:10px">${UI.skillIcon(sk,{size:'md'})}<div><b>${sk.displayName}</b><div class="muted">provider: ${sk.provider}</div><div class="muted">surface: events</div></div></div>
      </div>
      <div class="panel"><div class="sec">Allowed writes *I1</div>${UI.writeIcons(sk.allowedWrites)}</div>
      <div class="panel"><div class="sec">Before / After</div>
        <div class="delta">
          <div class="col"><span class="num base">${sk.baseScore}%</span><span class="muted">base contract</span></div>
          <span class="arrow">→</span>
          <div class="col"><span class="num after">${score}%</span><span class="muted">trained · OOS ${oos}%</span></div>
        </div>
        <div class="muted" style="margin-top:6px">delta +${score-sk.baseScore} pts</div>
      </div>
    </div>`;

  const trialCards = `
    <div class="win"><div class="win__bar"><span class="win__dot"></span> Trials <span style="opacity:.7">*C1</span></div>
      <div class="win__body trials">
        ${trials.map(t=>`
          <div class="trial trial--${t.status}${t.id===justId?' trial--justpassed':''}">
            <span class="trial__step"></span>
            <span class="trial__seal">${t.status==='pass'?'✓':'!'}</span>
            <div class="grow"><b>${t.name}</b> — <span class="muted">${t.prompt}</span>
              <div class="why">${t.status==='pass'?('learned '+t.learns):('next trial: '+t.reward)}</div></div>
            <span class="state state--${t.status==='pass'?'reliable':'learning'}">${t.status==='pass'?'pass':'weak'}</span>
          </div>`).join('')}
      </div>
    </div>`;

  const pct = Math.round((passed/trials.length)*100);
  const forge = `
    <div class="win"><div class="win__bar"><span class="win__dot"></span> Forge <span style="opacity:.7">*P1</span></div>
      <div class="win__body forgewrap">
        <div class="row between"><b>Starter Trial Pack</b><span class="muted">18 examples · ${trials.length} trial types</span></div>
        <div class="forge">
          <div class="forge__bar"><span style="width:${pct}%"></span></div>
          <div class="forge__lbl">${training?'forging…':'learned'} ${passed}/${trials.length} trials · ${pct}%</div>
        </div>
        <div class="row" style="gap:8px">
          <button class="btn btn--hero" type="button" id="train" ${training?'disabled':''} onclick="__train()">${trained?'Train Again':'Train Starter Skill'}</button>
          <button class="btn" type="button" ${training?'':'disabled'}>Stop</button>
        </div>
      </div>
    </div>`;

  const reward = `
    <div class="win"><div class="win__bar"><span class="win__dot"></span> Reward</div>
      <div class="win__body reward-acts">
        <button class="btn btn--hero" type="button" id="equip" ${trained?'':'disabled title="finish the weak trial first"'} onclick="__equip()">Equip Calendar</button>
        <button class="btn" type="button" ${trained?'':'disabled'}>Add After Gmail</button>
        <a class="btn" href="job-board.html">Claim Next Trial</a>
        <a class="btn" href="job-board.html">Open Job Board</a>
      </div>
    </div>`;

  document.getElementById('app').innerHTML = head + three + trialCards + forge + reward;
}

window.__train = ()=>{
  if (training || trained) { if(trained){ /* allow re-run */ } }
  training = true; justId = null; render();
  // fill the meter, flip the weak boundary trial, raise the eval
  setTimeout(()=>{
    const weak = trials.find(t=>t.status!=='pass');
    if (weak){ weak.status = 'pass'; justId = weak.id; }
    score = 97; oos = 98; trained = true; training = false;
    render();
    toast('Calendar is now Mastered (97%) — boundary trial passed');
  }, 1000);
};
window.__equip = ()=>{
  const saved = JSON.parse(sessionStorage.getItem('eg') || '{}');
  sessionStorage.setItem('eg', JSON.stringify({ ...saved, equippedId:'calendar' }));
  toast('Equipped Calendar — opening Skillbook…');
  setTimeout(()=>{ location.href = 'home.html'; }, 650);
};

render();
</script>
</body>
</html>
